server:
  port: 8090

spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: msv-medicos
              uri: lb://msv-medicos
              predicates:
                - Path=/api/medicos/**
              filters:
                - StripPrefix=2

            - id: msv-citas-1
              uri: lb://msv-citas-1
              predicates:
                - Path=/api/citas/**
              filters:
                - StripPrefix=2

    loadbalancer:
      enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka